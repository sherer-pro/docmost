name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Client tests
        run: pnpm --filter ./apps/client test

      - name: Server tests
        run: pnpm --filter ./apps/server test

      - name: Security regression tests
        run: pnpm test:security

      - name: Comment language check
        run: pnpm check:comments:en

      - name: Production audit (fail on high/critical)
        run: pnpm audit --prod --audit-level high
